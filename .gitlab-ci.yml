image: ubuntu:22.04

stages:
  - build_frontend
  - build_backend
  - test
  - deploy

cache:
  paths:
    - Frontend/build/
    - .m2/repository/
    - Frontend/.pub-cache/

# ---------- 前端 ----------
build_flutter:
  stage: build_frontend
  image: ghcr.io/cirruslabs/flutter:3.35.7
  script:
    - cd Frontend
    - flutter pub get
    - flutter build web --release
  artifacts:
    paths:
      - Frontend/build/web
  only:
    - local-upload
    - develop
    - main

# ---------- 后端 ----------
build_backend:
  stage: build_backend
  image: maven:3.9.9-eclipse-temurin-17
  script:
    - cd Backend/paperhub
    - mvn -B clean package -DskipTests
  artifacts:
    paths:
      - Backend/paperhub/target/*.jar
  only:
    - local-upload
    - develop
    - main

# ---------- 测试 ----------
test_backend:
  stage: test
  image: maven:3.9.9-eclipse-temurin-17
  services:
    - name: mysql:8.0
      alias: mysql
  variables:
    MYSQL_ROOT_PASSWORD: root
    MYSQL_DATABASE: spring_demo
    MYSQL_USER: springuser
    MYSQL_PASSWORD: 123456
    SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/spring_demo?useSSL=false&serverTimezone=UTC
  script:
    - cd Backend/paperhub
    - mvn test
  only:
    - merge_requests
    - main

# ---------- 部署 ----------
deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
  script:
    - scp -r Frontend/build/web/* user@server:/var/www/html/
    - scp Backend/paperhub/target/*.jar user@server:/home/user/app/
    - ssh user@server 'bash /home/user/app/restart.sh'
  only:
    - main
