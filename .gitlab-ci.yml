# 使用 GitLab Runner 的 Docker 执行环境
image: ubuntu:22.04

stages:
  - build
  - test
  - deploy

cache:
  paths:
    - build/
    - .gradle/
    - flutter/.pub-cache/

# ---------- 前端 Flutter 构建 ----------
build_flutter:
  stage: build
  image: ghcr.io/cirruslabs/flutter:3.24.0
  script:
    - echo "开始构建 Flutter 前端..."
    - cd frontend
    - flutter --version
    - flutter pub get
    - flutter build web --release
  artifacts:
    paths:
      - frontend/build/web
  only:
    - local-upload

# ---------- 后端 Spring Boot（Gradle）构建 ----------
build_backend:
  stage: build
  image: gradle:8.10.2-jdk17-alpine
  script:
    - echo "开始构建 Spring Boot 后端..."
    - cd backend
    # 确保 Gradle wrapper 可执行（部分 runner 环境需要这行）
    - chmod +x gradlew
    - ./gradlew clean build -x test
  artifacts:
    paths:
      - backend/build/libs/*.jar
  only:
    - local-upload

# ---------- 测试阶段 ----------
test_all:
  stage: test
  image: gradle:8.10.2-jdk17-alpine
  script:
    - echo "运行后端单元测试..."
    - cd backend
    - chmod +x gradlew
    - ./gradlew test
  only:
    - local-upload

# ---------- 部署阶段 ----------
deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
  script:
    - echo "部署到服务器..."
    - scp -r frontend/build/web/* user@server:/var/www/html/
    - scp backend/build/libs/*.jar user@server:/home/user/app/
    - ssh user@server 'bash /home/user/app/restart.sh'
  only:
    - local-upload
