stages:
  - backend_build
  - frontend_build
  - backend_test

# -------------------------------
# 后端：Spring Boot 构建
# -------------------------------
backend_build:
  stage: backend_build
  image: gradle:8.6-jdk17
  script:
    - echo "🏗️ 构建 Spring Boot 后端..."
    - cd Backend/paperhub
    - gradle clean build -x test
  artifacts:
    paths:
      - Backend/paperhub/build/libs/
    expire_in: 1 week
  only:
    - main
    - develop
    - local-upload

# -------------------------------
# 前端：Flutter 构建
# -------------------------------
frontend_build:
  stage: frontend_build
  image: cirrusci/flutter:3.24.0
  script:
    - echo "🎯 构建 Flutter 前端..."
    - cd Frontend
    - flutter pub get
    - flutter build web
  artifacts:
    paths:
      - Frontend/build/web
    expire_in: 1 week
  only:
    - main
    - develop
    - local-upload

# -------------------------------
# 后端测试（JUnit）
# -------------------------------
backend_test:
  stage: backend_test
  image: gradle:8.6-jdk17
  script:
    - echo "🧪 运行后端单元测试..."
    - cd Backend/paperhub
    - gradle test
  only:
    - merge_requests
    - main
    - develop
    - local-upload
